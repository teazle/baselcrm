name: Deploy to EC2

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate EC2 SSH reachability
        shell: bash
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_PORT: ${{ secrets.EC2_PORT || 22 }}
        run: |
          set -euo pipefail
          CONNECTED=false
          for attempt in 1 2 3; do
            echo "🔌 Reachability check ${attempt}/3 to EC2 SSH port..."
            if timeout 10 bash -c "cat < /dev/null > /dev/tcp/${EC2_HOST}/${EC2_PORT}" 2>/dev/null; then
              CONNECTED=true
              echo "✅ TCP connection to ${EC2_HOST}:${EC2_PORT} succeeded."
              break
            fi
            sleep 15
          done

          if [ "${CONNECTED}" != "true" ]; then
            echo "❌ Cannot reach EC2 SSH endpoint from GitHub runner (${EC2_HOST}:${EC2_PORT})."
            echo "Likely causes: EC2 stopped, wrong EC2_HOST/EC2_PORT, or AWS security rules blocking GitHub-hosted runners."
            exit 1
          fi

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_ENV_FILE: ${{ secrets.EC2_ENV_FILE }}
          DEPLOY_CRM_ENV_LOCAL: ${{ secrets.EC2_CRM_ENV_LOCAL }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          timeout: 60s
          command_timeout: 40m
          envs: DEPLOY_ENV_FILE,DEPLOY_CRM_ENV_LOCAL
          script_stop: true
          script: |
            # Expand ~ to home directory and set deploy path
            DEPLOY_PATH="${{ secrets.EC2_DEPLOY_PATH || '~/Baselrpacrm' }}"
            DEPLOY_PATH="${DEPLOY_PATH/#\~/$HOME}"

            echo "📁 Deploy path: $DEPLOY_PATH"
            cd "$DEPLOY_PATH" || { echo "❌ Error: Cannot cd to $DEPLOY_PATH"; exit 1; }

            # Verify we're in a git repository
            if [ ! -d .git ]; then
              echo "❌ Error: Not a git repository in $DEPLOY_PATH"
              exit 1
            fi

            # Pull latest changes
            echo "📥 Pulling latest changes from Git..."
            git fetch origin || { echo "⚠️  Warning: git fetch failed"; }

            # Get current branch
            CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "main")
            echo "🌿 Current branch: $CURRENT_BRANCH"

            # Reset to latest from origin
            git reset --hard origin/main 2>/dev/null || git reset --hard origin/master 2>/dev/null || {
              echo "⚠️  Warning: git reset failed, trying pull instead"
              git pull origin "$CURRENT_BRANCH" || true
            }

            # Sync environment files from GitHub Secrets (if provided)
            echo "🔐 Syncing environment files..."
            if [ -n "${DEPLOY_ENV_FILE:-}" ]; then
              printf '%s\n' "${DEPLOY_ENV_FILE}" | tr -d '\r' > .env
              chmod 600 .env 2>/dev/null || true
              echo "✅ Updated root .env from EC2_ENV_FILE"
            else
              echo "ℹ️  EC2_ENV_FILE not set; keeping existing root .env"
            fi

            if [ -d apps/crm ]; then
              if [ -n "${DEPLOY_CRM_ENV_LOCAL:-}" ]; then
                printf '%s\n' "${DEPLOY_CRM_ENV_LOCAL}" | tr -d '\r' > apps/crm/.env.local
                chmod 600 apps/crm/.env.local 2>/dev/null || true
                echo "✅ Updated apps/crm/.env.local from EC2_CRM_ENV_LOCAL"
              elif [ -n "${DEPLOY_ENV_FILE:-}" ]; then
                cp .env apps/crm/.env.local
                chmod 600 apps/crm/.env.local 2>/dev/null || true
                echo "✅ Synced apps/crm/.env.local from root .env"
              else
                echo "ℹ️  EC2_CRM_ENV_LOCAL not set; keeping existing apps/crm/.env.local"
              fi
            fi

            # Check if package.json changed (compare with previous commit if available)
            echo "📦 Checking for dependency updates..."
            PACKAGE_CHANGED=false

            # Try to detect changes in package files
            if git rev-parse HEAD@{1} >/dev/null 2>&1; then
              # Previous commit exists, check diff
              if git diff HEAD@{1} HEAD --name-only 2>/dev/null | grep -q "package.json\|package-lock.json"; then
                PACKAGE_CHANGED=true
              fi
            else
              # No previous commit, check if package files exist and are tracked
              if git ls-files --error-unmatch package.json package-lock.json >/dev/null 2>&1; then
                # Files are tracked, check if they changed in current commit
                if git diff HEAD --name-only 2>/dev/null | grep -q "package.json\|package-lock.json"; then
                  PACKAGE_CHANGED=true
                fi
              fi
            fi

            if [ "$PACKAGE_CHANGED" = true ]; then
              echo "📦 Installing/updating dependencies..."
              npm install || { echo "⚠️  Warning: npm install failed"; }
              npm run install-browsers || { echo "⚠️  Warning: install-browsers failed"; }
            else
              echo "ℹ️  No dependency changes detected"
            fi

            # Build and deploy Next.js CRM app
            if [ -d apps/crm ]; then
              echo "🏗️  Building CRM app (apps/crm)..."
              cd apps/crm
              
              # STOP any existing process on port 3000 (dev or prod)
              echo "🛑 Stopping any process on port 3000..."
              if command -v pm2 &> /dev/null; then
                pm2 delete crm 2>/dev/null || true
              fi
              # Kill any remaining process on port 3000
              sudo fuser -k 3000/tcp 2>/dev/null || true
              sleep 2
              
              # Install CRM dependencies if needed
              if [ ! -d node_modules ] || [ "$PACKAGE_CHANGED" = true ]; then
                echo "📦 Installing CRM dependencies..."
                npm install || { echo "⚠️  Warning: CRM npm install failed"; }
              fi
              
              # Build the Next.js app for production.
              # Use webpack mode for CI/deploy stability on Next.js 16.
              echo "🏗️  Running production build..."
              npm run build -- --webpack || { echo "❌ CRM build failed"; exit 1; }
              
              # Verify build exists
              if [ ! -d .next ]; then
                echo "❌ .next folder not found after build!"
                exit 1
              fi
              echo "✅ Build successful - .next folder exists"
              
              # Start CRM with PM2 in production mode
              if command -v pm2 &> /dev/null; then
                echo "🚀 Starting CRM and restarting PM2 processes..."
                pm2 start ecosystem.config.cjs --only crm --update-env
                pm2 restart all --update-env || true
                pm2 save
                sleep 3
                pm2 status
              else
                echo "⚠️  PM2 not installed - starting directly..."
                nohup npm start > /tmp/crm.log 2>&1 &
              fi
              
              cd "$DEPLOY_PATH"
            fi

            echo "✅ Deployment complete!"

            # Show current status
            echo "📊 Current status:"
            echo "  Branch: $(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo 'unknown')"
            echo "  Commit: $(git log -1 --oneline 2>/dev/null || echo 'unknown')"
            if command -v pm2 &> /dev/null; then
              echo "  PM2 Status:"
              pm2 status || true
            fi
