name: EC2 OTP Mailbox Smoke

on:
  workflow_dispatch:

jobs:
  otp-mailbox-smoke:
    name: Verify EC2 OTP mailbox
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Verify EC2 OTP mailbox
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          timeout: 60s
          command_timeout: 10m
          script_stop: false
          script: |
            set -euo pipefail

            DEPLOY_PATH="${{ secrets.EC2_DEPLOY_PATH || '~/Baselrpacrm' }}"
            DEPLOY_PATH="${DEPLOY_PATH/#\~/$HOME}"
            cd "$DEPLOY_PATH"

            TMP_SCRIPT=".otp-smoke-$$.mjs"
            cat > "$TMP_SCRIPT" <<'NODE'
            import 'dotenv/config';
            import { ImapFlow } from 'imapflow';
            import { getMailConfigsFromEnv } from './src/utils/portal-otp.js';

            const maskEmail = value => {
              const raw = String(value || '').trim();
              const [local, domain] = raw.split('@');
              if (!raw || !domain) return raw ? 'set' : 'missing';
              return `${local.slice(0, 2)}***@${domain}`;
            };

            const accounts = getMailConfigsFromEnv().filter(account => account.email || account.appPassword);
            if (accounts.length === 0) {
              console.log(JSON.stringify({
                ok: false,
                status: 'config_missing',
                accounts: [],
              }));
              process.exit(1);
            }

            const results = [];
            try {
              for (const account of accounts) {
                if (!account.email || !account.appPassword) {
                  results.push({
                    ok: false,
                    status: 'config_missing',
                    email: maskEmail(account.email),
                    suffix: account.suffix || null,
                    passwordSet: Boolean(account.appPassword),
                  });
                  continue;
                }
                const client = new ImapFlow({
                  host: account.host,
                  port: account.port,
                  secure: account.secure,
                  auth: { user: account.email, pass: account.appPassword },
                  logger: false,
                });
                try {
                  await client.connect();
                  const lock = await client.getMailboxLock('INBOX');
                  const inboxCount = client.mailbox?.exists ?? null;
                  lock.release();
                  await client.logout().catch(() => {});
                  results.push({
                    ok: true,
                    status: 'imap_connected',
                    email: maskEmail(account.email),
                    suffix: account.suffix || null,
                    inboxCount,
                  });
                } catch (error) {
                  await client.logout().catch(() => {});
                  results.push({
                    ok: false,
                    status: /auth|invalid credentials|application-specific password|login failed/i.test(String(error?.message || error))
                      ? 'imap_auth_error'
                      : 'imap_error',
                    email: maskEmail(account.email),
                    suffix: account.suffix || null,
                    error: error?.code || error?.responseStatusText || error?.message || 'imap_error',
                  });
                }
              }
              console.log(JSON.stringify({
                ok: results.some(result => result.ok),
                status: results.some(result => result.ok) ? 'imap_connected' : 'imap_error',
                accounts: results,
              }));
              if (!results.some(result => result.ok)) process.exit(1);
            } catch (error) {
              console.log(JSON.stringify({
                ok: false,
                status: 'imap_error',
                error: error?.code || error?.responseStatusText || error?.message || 'imap_error',
              }));
              process.exit(1);
            }
            NODE
            node "$TMP_SCRIPT"
            rm -f "$TMP_SCRIPT"
